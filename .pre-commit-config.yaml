repos:
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        args: [--in-place, --remove-all-unused-imports]
  - repo: https://github.com/psf/black
    rev: 24.1.1  # pin to a specific version
    hooks:
      - id: black
        language_version: python3
